XBotCore:
  config_path: "robots/iit-teleop-ros-pkg/teleop_config/teleop_impedance.yaml"

XBotInterface:
  urdf_path: "robots/iit-teleop-ros-pkg/teleop_urdf/urdf/teleop_fixed_base.urdf"
  srdf_path: "robots/iit-teleop-ros-pkg/teleop_srdf/srdf/teleop_fixed_base.srdf"
  joint_map_path: "robots/iit-teleop-ros-pkg/teleop_config/teleop_joint_map.yaml"

RobotInterface:
  framework_name: "ROS"

ModelInterface:
  model_type: "RBDL"
  is_model_floating_base: "false"
  
MasterCommunicationInterface:
  framework_name: "ROS"

XBotRTPlugins:
  plugins: ["HomingExample", "CartesianPlugin"] 
  io_plugins: ["CartesianIO"]
  
NRTPlugins:
  plugins: [] 
  
TransmissionPlugins:
  plugins: [] 

WebServer:
  enable: "true"
  address: "127.0.0.1"
  port: "8081"

SimulationOptions:
  verbose_mode: "true"

CartesianInterface:
  solver: "OpenSotAcc"
  problem_description:
    solver_options:
        regularization: 1e-3
        back_end: "qpoases"
        control_dt: 0.001
    stack:
     - ["ArmPosition"]
     - ["ArmOrientation"]
#     - ["Postural"]
    
    constraints: ["JointLimits", "VelocityLimits"] 
 
    ArmPosition:
      type: "Cartesian"
      distal_link: "TCP"
      lambda: 0.0 #0.025
      lambda2: 3.
      indices: [0,1,2]

    ArmOrientation:
      type: "Cartesian"
      distal_link: "TCP"
      lambda: 0.0 #0.025
      lambda2: 3.
      indices: [3,4,5]    

    ArmEE:
      type: "Cartesian"
      distal_link: "teleop_link5"
      lambda: 0.05

    Postural:
      type: "Postural"
      lambda: 0.015
      lambda2: 5.
