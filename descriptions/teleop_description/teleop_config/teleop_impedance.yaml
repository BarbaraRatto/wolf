  aux_pdo : # names defined in SDO index 0x8002 
     rd :  [ pos_ref_fb ]
  NO_upd_params:
    sandBoxAngle : 0.05
    sandBoxFriction : 0.5
    
        
__CentAcESC_1:
  sign: 1
  pos_offset: 0
  #<<: *CentAcESC_X
  control_mode : D4_impedance_ctrl
  pid :
    # torque control
    #impedance:  [0.0, 0.0, 5.0, 0.01, 0.8]
    impedance:   [250.0, 5.0, 2.0, 0.01, 0.8]

# B14
HpESC_101:
  <<: *HpESC_X
