#!/usr/bin/env python
PACKAGE = "dls_controller"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

gen.add("toggle_solver"          , bool_t,   0, "toggle solver"          , False)
gen.add("toggle_relative_tasks"  , bool_t,   1, "toggle relative tasks"  , False)
gen.add("toggle_tracking"        , bool_t,   2, "toggle tracking"        , False)
gen.add("duty_cycle"             , double_t, 3, "duty cycle"           , 0.7, 0, 1)

gen.add("rf_foot_lambda", double_t, 4, "rf foot lambda ", 1000.0,  0, 10000)
gen.add("lf_foot_lambda", double_t, 4, "lf foot lambda ", 1000.0,  0, 10000)
gen.add("rh_foot_lambda", double_t, 4, "rh foot lambda ", 1000.0,  0, 10000)
gen.add("lh_foot_lambda", double_t, 4, "lh foot lambda ", 1000.0,  0, 10000)
gen.add("com_lambda"    , double_t, 4, "com lambda"     , 800.0,   0, 10000)
gen.add("waist_lambda"  , double_t, 4, "waist lambda"   , 400.0,   0, 10000)
gen.add("postural_lambda"      , double_t, 4, "postural lambda", 400.0,   0, 10000)

gaits_list = gen.enum([ gen.const("trot",       str_t, "trot",      "Trot"         ),
                        gen.const("half_trot",  str_t, "half_trot", "Two legs trot"),
                        gen.const("crawl",      str_t, "crawl", "Baby crawl")],
                        "Gaits")
gen.add("Gaits", str_t, 5, "Gaits", "crawl", edit_method=gaits_list)

gen.add("swing_frequency", double_t, 6, "swing frequency  ", 2.0,         0, 10.0)
gen.add("amp_x",           double_t, 7, "trajectory amp X ", 0.0,     -10.0, 10.0)
gen.add("amp_y",           double_t, 8, "trajectory amp Y ", 0.0,     -10.0, 10.0)
gen.add("amp_z",           double_t, 9, "trajectory amp Z ", 0.1,     -10.0, 10.0)

exit(gen.generate(PACKAGE, "dls_controller", "DlsController"))
