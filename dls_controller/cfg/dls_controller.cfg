#!/usr/bin/env python
PACKAGE = "dls_controller"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

gen.add("toggle_solver"  , bool_t, 0, "toggle solver"  , False)
gen.add("toggle_tracking", bool_t, 1, "toggle tracking", False)
gen.add("duty_cycle"  ,    double_t, 2, "duty cycle"  , 0.7, 0, 1)

gen.add("rf_foot_lambda", double_t, 3, "rf foot lambda ", 1000.0,  0, 10000)
gen.add("lf_foot_lambda", double_t, 3, "lf foot lambda ", 1000.0,  0, 10000)
gen.add("rh_foot_lambda", double_t, 3, "rh foot lambda ", 1000.0,  0, 10000)
gen.add("lh_foot_lambda", double_t, 3, "lh foot lambda ", 1000.0,  0, 10000)
gen.add("com_lambda"    , double_t, 3, "com_lambda"     , 800.0,   0, 10000)
gen.add("waist_lambda"  , double_t, 3, "waist_lambda"   , 400.0,   0, 10000)

gaits_list = gen.enum([ gen.const("trot",       str_t, "trot",      "Trot"         ),
                        gen.const("half_trot",  str_t, "half_trot", "Two legs trot")],
                        "An enum to set size")
gen.add("Gaits", str_t, 4, "Gaits", "trot", edit_method=gaits_list)

exit(gen.generate(PACKAGE, "dls_controller", "DlsController"))
