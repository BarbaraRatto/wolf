solver_options:
    regularization: 1e-6
    back_end: "qpoases"

stack:
    - ["FLLeg", "FRLeg", "BLLeg", "BRLeg"]
    - ["CoM", "TrunkRPY"]


constraints: ["JointLimits", "VelocityLimits"]

FLLeg:
    type: "Cartesian"
    distal_link: "lf_foot"
    base_link: "world"
    lambda: 0.1
    indices: [0,1,2]

FRLeg:
    type: "Cartesian"
    distal_link: "rf_foot"
    base_link: "world"
    lambda: 0.1
    indices: [0,1,2]

BLLeg:
    type: "Cartesian"
    distal_link: "lh_foot"
    base_link: "world"
    lambda: 0.1
    indices: [0,1,2]

BRLeg:
    type: "Cartesian"
    distal_link: "rh_foot"
    base_link: "world"
    lambda: 0.1
    indices: [0,1,2]


CoM:
    type: "Com"
    lambda: 0.1
    indices: [0,1,2]

TrunkRPY:
    type: "Cartesian"
    distal_link: "trunk"
    lambda: 0.1
    indices: [3,4,5]
