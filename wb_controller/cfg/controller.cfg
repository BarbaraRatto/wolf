#!/usr/bin/env python
PACKAGE = "wb_controller"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

gen.add("toggle_solver"                 , bool_t,   0, "toggle solver"                  , False)
gen.add("toggle_base_height_control"    , bool_t,   1, "base height control"            , False)
gen.add("toggle_inertia_compensation"   , bool_t,   2, "activate the inertia compesantion at the joints" , False)
gen.add("duty_factor"                   , double_t, 3, "duty factor"                     , 0.4, 0, 1)

gaits_list = gen.enum([ gen.const("trot",           str_t, "trot",         "Trot"              ),
                        gen.const("crawl",          str_t, "crawl",        "Baby Crawl"        )],
                        "Gaits")
gen.add("gaits", str_t, 4, "gaits", "crawl", edit_method=gaits_list)

gen.add("swing_frequency"         , double_t, 5,   "swing frequency"               , 0.0  ,0.0 ,6.0)
gen.add("base_linear_vel"         , double_t, 6,   "base linear velocity"          , 0.0  ,0.0 ,1.0)
gen.add("base_angular_vel"        , double_t, 7,   "base angular velocity"         , 0.0  ,0.0 ,1.0)
gen.add("step_height"             , double_t, 8,   "step height"                   , 0.0  ,0.0 ,0.2)
gen.add("contact_force_th"        , double_t, 9,   "contact force threshold"      , 0.0  ,0.0 ,100.0)
gen.add("pid_scale"               , double_t, 10,  "pid scale"                     , 0.0  ,0.0 ,1.0)
gen.add("cutoff_hz_qdot"          , double_t, 11,  "cutoff hz qdot"                , 0.0  ,0.0 ,300.0)
gen.add("cutoff_hz_gyro"          , double_t, 12,  "cutoff hz gyro"                , 0.0  ,0.0 ,300.0)
gen.add("clik_gain"               , double_t, 13,  "closed loop kinematics proporional gain"   , 0.0  ,0.0 ,1000.0)

gen.add("kp_haa_swing"            , double_t, 14,  "kp_swing"                            , 0.0  ,0.0 ,1000.0)
gen.add("kp_hfe_swing"            , double_t, 14,  "kp_swing"                            , 0.0  ,0.0 ,1000.0)
gen.add("kp_kfe_swing"            , double_t, 14,  "kp_swing"                            , 0.0  ,0.0 ,1000.0)
gen.add("kd_haa_swing"            , double_t, 14,  "kd_swing"                            , 0.0  ,0.0 ,1000.0)
gen.add("kd_hfe_swing"            , double_t, 14,  "kd_swing"                            , 0.0  ,0.0 ,1000.0)
gen.add("kd_kfe_swing"            , double_t, 14,  "kd_swing"                            , 0.0  ,0.0 ,1000.0)

gen.add("kp_haa_stance"            , double_t, 14,  "kp_stance"                          , 0.0  ,0.0 ,1000.0)
gen.add("kp_hfe_stance"            , double_t, 14,  "kp_stance"                          , 0.0  ,0.0 ,1000.0)
gen.add("kp_kfe_stance"            , double_t, 14,  "kp_stance"                          , 0.0  ,0.0 ,1000.0)
gen.add("kd_haa_stance"            , double_t, 14,  "kd_stance"                          , 0.0  ,0.0 ,1000.0)
gen.add("kd_hfe_stance"            , double_t, 14,  "kd_stance"                          , 0.0  ,0.0 ,1000.0)
gen.add("kd_kfe_stance"            , double_t, 14,  "kd_stance"                          , 0.0  ,0.0 ,1000.0)

stacks_list = gen.enum([ gen.const("walking",               str_t, "walking",             "walking"             ),
                         gen.const("manipulation",          str_t, "manipulation",        "manipulation"        )],
                        "Stacks")
gen.add("stacks", str_t, 15, "stacks", "walking", edit_method=stacks_list)

exit(gen.generate(PACKAGE, "wb_controller", "controller"))
