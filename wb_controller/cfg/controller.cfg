#!/usr/bin/env python
PACKAGE = "wb_controller"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

gen.add("toggle_solver"                 , bool_t,   0, "toggle solver"                  , False)
gen.add("toggle_haptic"                 , bool_t,   1, "close the haptic contact loop"  , False)
gen.add("toggle_base_height_control"    , bool_t,   2, "base height control"            , False)
gen.add("duty_cycle"                    , double_t, 3, "duty cycle"                     , 0.9, 0, 1)

gaits_list = gen.enum([ gen.const("trot",           str_t, "trot",         "Trot"              ),
                        gen.const("crawl",          str_t, "crawl",        "Baby Crawl"        ),
                        gen.const("one_foot_lf",    str_t, "one_foot_lf",  "One single foot"   ),
                        gen.const("one_foot_rh",    str_t, "one_foot_rh",  "One single foot"   ),
                        gen.const("one_foot_rf",    str_t, "one_foot_rf",  "One single foot"   ),
                        gen.const("one_foot_lh",    str_t, "one_foot_lh",  "One single foot"   )],
                        "Gaits")
gen.add("gaits", str_t, 4, "gaits", "crawl", edit_method=gaits_list)

gen.add("swing_frequency"         , double_t, 5,   "swing frequency"               , 2.0  ,0.0 ,6.0)
gen.add("base_max_linear_vel"     , double_t, 6,   "maximum base velocity"         , 0.0  ,0.0 ,1.0)
gen.add("base_max_angular_vel"    , double_t, 7,   "maximum base rotation rate"    , 0.0  ,0.0 ,1.0)
gen.add("max_step_height"         , double_t, 8,   "max step height"               , 0.0  ,0.0 ,1.0)
gen.add("max_step_length"         , double_t, 9,   "max step length"               , 0.0  ,0.0 ,1.0)
gen.add("contact_force_th"        , double_t, 10,   "contact force threshold"       , 0.0  ,0.0 ,100.0)
gen.add("pid_scale"               , double_t, 11,  "pid scale"                     , 1.0  ,0.0 ,1.0)
gen.add("cutoff_hz_qdot"          , double_t, 12,  "cutoff hz qdot"                , 0.0  ,0.0 ,300.0)
gen.add("cutoff_hz_gyro"          , double_t, 13,  "cutoff hz gyro"                , 0.0  ,0.0 ,300.0)

exit(gen.generate(PACKAGE, "wb_controller", "controller"))
