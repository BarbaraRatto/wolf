wb_controller:
  type: wb_controller/Controller
  publish_rate: 250
  joints:
  - lf_haa_joint
  - lf_hfe_joint
  - lf_kfe_joint
  - lh_haa_joint
  - lh_hfe_joint
  - lh_kfe_joint
  - rf_haa_joint
  - rf_hfe_joint
  - rf_kfe_joint
  - rh_haa_joint
  - rh_hfe_joint
  - rh_kfe_joint
  feet:
  - rh_foot
  - lf_foot
  - lh_foot
  - rf_foot
  hips:
  - rh_hip_assembly
  - lf_hip_assembly
  - lh_hip_assembly
  - rf_hip_assembly
  imu_sensor: trunk_imu
  default_swing_frequency: 2.5
  default_contact_threshold: 15.0
  default_base_linear_velocity: 0.4
  default_base_angular_velocity: 0.2
  default_step_height: 0.065
  default_z_lower_force: 2.5
  max_step_height: 0.15
  max_step_length: 0.5
  estimation_position_type: ground_truth
  estimation_orientation_type: ground_truth
  gains:

      lf_haa_joint: {p: 10.0, i: 0.0, d: 1.0}
      lf_hfe_joint: {p: 5.0, i: 0.0, d: 0.5}
      lf_kfe_joint: {p: 1.0, i: 0.0, d: 0.01}

      rf_haa_joint: {p: 10.0, i: 0.0, d: 1.0}
      rf_hfe_joint: {p: 5.0, i: 0.0, d: 0.5}
      rf_kfe_joint: {p: 1.0, i: 0.0, d: 0.01}

      lh_haa_joint: {p: 10.0, i: 0.0, d: 1.0}
      lh_hfe_joint: {p: 5.0, i: 0.0, d: 0.5}
      lh_kfe_joint: {p: 1.0, i: 0.0, d: 0.01}

      rh_haa_joint: {p: 10.0, i: 0.0, d: 1.0}
      rh_hfe_joint: {p: 5.0, i: 0.0, d: 0.5}
      rh_kfe_joint: {p: 1.0, i: 0.0, d: 0.01}

      kp_swing: {haa: 1000.0, hfe: 1000.0, kfe: 1000.0}
      kd_swing: {haa: 10.0, hfe: 10.0, kfe: 10.0}

      kp_stance: {haa: 300.0, hfe: 300.0, kfe: 300.0}
      kd_stance: {haa: 20.0, hfe: 20.0, kfe: 20.0}

      kp_waist: {x: 0.0, y: 0.0, z: 0.0, roll: 240.0, pitch: 140.0, yaw: 80.0}
      kd_waist: {x: 0.0, y: 0.0, z: 0.0, roll: 50.0, pitch: 30.0, yaw: 16.0}

      clik_gain: 1.0
