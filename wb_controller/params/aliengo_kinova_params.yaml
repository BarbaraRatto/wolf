wb_controller:
  type: wb_controller/Controller
  publish_rate: 250
  joints:
  - lf_haa_joint
  - lf_hfe_joint
  - lf_kfe_joint
  - lh_haa_joint
  - lh_hfe_joint
  - lh_kfe_joint
  - rf_haa_joint
  - rf_hfe_joint
  - rf_kfe_joint
  - rh_haa_joint
  - rh_hfe_joint
  - rh_kfe_joint
  - kinova_joint_1
  - kinova_joint_2
  - kinova_joint_3
  - kinova_joint_4
  feet:
  - rh_foot
  - lf_foot
  - lh_foot
  - rf_foot
  hips:
  - rh_hip
  - lf_hip
  - lh_hip
  - rf_hip
  arm_tip: kinova_end_effector
  imu_sensor: trunk_imu
  default_swing_frequency: 2.5
  default_contact_threshold: 15.0
  default_base_linear_velocity: 0.4
  default_base_angular_velocity: 0.2
  default_step_height: 0.065
  default_z_lower_force: 2.5
  max_step_height: 0.15
  max_step_length: 0.5
  estimation_position_type: ground_truth
  estimation_orientation_type: ground_truth
  gains:

      clik_gain: 1.0

      kinova_joint_1: {p: 1.0, i: 0.0, d: 0.01}
      kinova_joint_2: {p: 1.0, i: 0.0, d: 0.01}
      kinova_joint_3: {p: 1.0, i: 0.0, d: 0.01}
      kinova_joint_4: {p: 1.0, i: 0.0, d: 0.01}

      lf_haa_joint: {p: 100.0, i: 0.0, d: 5.0}
      lf_hfe_joint: {p: 300.0, i: 0.0, d: 8.0}
      lf_kfe_joint: {p: 300.0, i: 0.0, d: 8.0}

      rf_haa_joint: {p: 100.0, i: 0.0, d: 5.0}
      rf_hfe_joint: {p: 300.0, i: 0.0, d: 8.0}
      rf_kfe_joint: {p: 300.0, i: 0.0, d: 8.0}

      lh_haa_joint: {p: 100.0, i: 0.0, d: 5.0}
      lh_hfe_joint: {p: 300.0, i: 0.0, d: 8.0}
      lh_kfe_joint: {p: 300.0, i: 0.0, d: 8.0}

      rh_haa_joint: {p: 100.0, i: 0.0, d: 5.0}
      rh_hfe_joint: {p: 300.0, i: 0.0, d: 8.0}
      rh_kfe_joint: {p: 300.0, i: 0.0, d: 8.0}

      kp_swing: {haa: 100.0, hfe: 100.0, kfe: 100.0}
      kd_swing: {haa: 5.0, hfe: 5.0, kfe: 5.0}

      kp_stance: {haa: 300.0, hfe: 300.0, kfe: 300.0}
      kd_stance: {haa: 20.0, hfe: 20.0, kfe: 20.0}

      waistRPY:
          Kp: {x: 0.0, y: 0.0, z: 0.0, roll: 240.0, pitch: 140.0, yaw: 80.0}
          Kd: {x: 0.0, y: 0.0, z: 0.0, roll: 50.0, pitch: 30.0, yaw: 16.0}


