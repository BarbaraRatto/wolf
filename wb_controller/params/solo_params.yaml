wb_controller:
  type: wb_controller/Controller
  default_duty_factor: 0.3
  default_swing_frequency: 4.2
  default_contact_threshold: 0.0
  default_base_linear_velocity: 0.25
  default_base_angular_velocity: 0.2
  default_step_height: 0.04
  max_step_height: 0.1
  max_step_length: 0.5
  estimation_position_type: ground_truth
  estimation_orientation_type: ground_truth
  
  use_xbox_controller: true
  
  gains:

      clik_gain: 30.

      lf_haa_joint: {p: 30.0, i: 0.0, d: 0.15}
      lf_hfe_joint: {p: 30.0, i: 0.0, d: 0.15}
      lf_kfe_joint: {p: 30.0, i: 0.0, d: 0.15}
      rf_haa_joint: {p: 30.0, i: 0.0, d: 0.15}
      rf_hfe_joint: {p: 30.0, i: 0.0, d: 0.15}
      rf_kfe_joint: {p: 30.0, i: 0.0, d: 0.15}
      lh_haa_joint: {p: 30.0, i: 0.0, d: 0.15}
      lh_hfe_joint: {p: 30.0, i: 0.0, d: 0.15}
      lh_kfe_joint: {p: 30.0, i: 0.0, d: 0.15}
      rh_haa_joint: {p: 30.0, i: 0.0, d: 0.15}
      rh_hfe_joint: {p: 30.0, i: 0.0, d: 0.15}
      rh_kfe_joint: {p: 30.0, i: 0.0, d: 0.15}

      kp_swing: {haa: 100.0, hfe: 100.0, kfe: 100.0}
      kd_swing: {haa: 10.0, hfe: 10.0, kfe: 10.0}

      kp_stance: {haa: 100.0, hfe: 100.0, kfe: 100.0}
      kd_stance: {haa: 10.0, hfe: 10.0, kfe: 10.0}

      waistRPY:
          Kp: {x: 0.0, y: 0.0, z: 0.0, roll: 100.0, pitch: 100.0, yaw: 100.0}
          Kd: {x: 0.0, y: 0.0, z: 0.0, roll: 10.0, pitch: 10.0, yaw: 10.0}

      waistZ:
          Kp: {x: 0.0, y: 0.0, z: 50.0, roll: 0.0, pitch: 0.0, yaw: 0.0}
          Kd: {x: 0.0, y: 0.0, z: 5.0, roll: 0.0, pitch: 0.0, yaw: 0.0}

          
      CoM:
          weight: 100.0



